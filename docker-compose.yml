version: '3.9'
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_WS_URL=ws://localhost:8000
    ports: ["3000:80"]
    depends_on: [backend]
    restart: unless-stopped
